# build-runtime-arm64.yml — CI-dispatched aarch64-unknown-linux-gnu runtime build (#116).
#
# Why this exists separately from build-runtime.yml:
#   - build-runtime.yml runs on titan (x86_64) and builds amd64 there.
#   - titan CANNOT build arm64 Linux, and **mutsu is not a Gitea Actions runner**
#     (docs/ci-runner-mutsu.md — macOS act_runner has an RPC issue), so there is
#     no `runs-on: mutsu`. The arm64 Linux runtime builds natively on mutsu in an
#     aarch64 Colima Linux VM, dispatched over SSH.
#   - This workflow runs on the titan runner and SSH-drives the existing
#     scripts/mutsu-build-linux-arm64.sh. titan is the dedicated, always-on,
#     monitored runner; it survives an operator workstation reboot, which a
#     hand-run SSH session does not. mutsu does the actual compute over SSH.
#
# SSH to mutsu: the job builds a job-local SSH config from the `MUTSU_SSH_KEY`
# Actions secret (the mutsu_automation private key) and connects to mutsu by IP
# (10.0.42.41, user manitcor) — the runner job environment does not resolve the
# `mutsu-agent` DNS alias. See docs/ci-secrets.md ("mutsu SSH access"). For an
# ad-hoc/debug run against an SSH config already on the runner, pass the
# `ssh_config` input.
#
# Publish: `runtime-push.sh arm64` uploads the runtime asset to the shared
# `runtime-<hash>` (or `runtime-x11-<hash>`) release — the same publish path and
# token (BUILD_REPO_TOKEN) build-runtime.yml uses for the x86_64 tarballs. CI
# artifact publishing uses the standard CI token; the deliver-as-roctinam policy
# applies to authored git/tracker deliveries, not artifact uploads.
#
# Triggers:
#   - workflow_dispatch: manual run (build-only, preflight, or publish).
#   - push: tags ['v*']: a release tag auto-dispatches this build (headless,
#     publish=true) so the aarch64-unknown-linux-gnu runtime lands on the shared
#     runtime-<hash> release; on success it re-dispatches release.yml with
#     include_linux_arm64=true to package + attach the arm64 installers to the
#     same release (Option A "async attach" — release.yml publishes amd64
#     immediately; arm64 attaches when this multi-hour build finishes).
# This is a multi-hour native Chromium build. The mutsu checkout, Colima home,
# and VM build dir all live on the external drive /Volumes/build (mutsu's system
# drive is too small) — pinned via the MUTSU_* env below so they can never
# regress to the system drive.

name: Build Runtime (arm64 / mutsu)

on:
  # No v* tag trigger: runtimes are built (manually / on main) BEFORE a release
  # is tagged, so the tag must not kick off a redundant/failing mutsu build.
  # arm64-linux is deferred (#116); macOS is built on-demand then release.yml
  # pulls the published asset. (#227/#228)
  workflow_dispatch:
    inputs:
      ozone_platform:
        description: 'Ozone variant(s) to build on mutsu'
        required: false
        default: 'headless'
        type: choice
        options:
          - headless
          - x11
          - both
      publish:
        description: 'Publish the runtime asset(s) to the runtime-<hash> release (needs a roctinam BUILD_REPO_TOKEN)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      preflight_only:
        description: 'Only check mutsu readiness (tooling, Colima profile, checkout) and stop'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      ninja_jobs:
        description: 'ninja -j parallelism passed to the build (empty = builder default)'
        required: false
        default: ''
      skip_sync:
        description: 'Skip Chromium gclient sync on mutsu (faster re-build; still resets + applies patches)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      ssh_config:
        description: 'Override: path to an SSH config already on the runner (default: build one from the MUTSU_SSH_KEY secret)'
        required: false
        default: ''

env:
  CARGO_TERM_COLOR: always
  # External-drive pins (mutsu system drive is too small for a Chromium build).
  # These match scripts/mutsu-build-linux-arm64.sh defaults; setting them
  # explicitly guards against a future default change moving the build onto
  # mutsu's small system drive. The driver reads them on the titan side.
  MUTSU_LINUX_CARBONYL_DIR: /Volumes/build/carbonyl-linux-arm64
  MUTSU_COLIMA_HOME: /Volumes/build/.colima
  MUTSU_VM_BUILD_DIR: /mnt/lima-colima-carbonyl-linux-arm64/carbonyl-linux-arm64

# One mutsu build at a time across BOTH arm64-linux and macOS: mutsu is a single
# Apple Silicon host and the builds share its CPU/RAM and the /Volumes/build
# external drive. The shared group serializes them (and the arm64 ozone variants)
# so concurrent runs never oversubscribe mutsu or clash on remote state. Do NOT
# cancel an in-flight build — let it finish; queue the next.
concurrency:
  group: build-runtime-mutsu
  cancel-in-progress: false

jobs:
  build-runtime-arm64:
    name: Build aarch64-unknown-linux-gnu on mutsu (${{ github.event.inputs.ozone_platform || 'headless' }})
    runs-on: titan
    timeout-minutes: 600

    steps:
      - name: Checkout repo at the dispatched ref
        run: |
          set -euo pipefail
          rm -rf "${GITHUB_WORKSPACE}/.repo-clone" 2>/dev/null || true
          git clone --depth 1 --branch "${{ github.ref_name }}" \
            "https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git" \
            "${GITHUB_WORKSPACE}/.repo-clone"

      - name: Set up mutsu SSH (from MUTSU_SSH_KEY) + resolve ozone variants
        env:
          # The mutsu_automation private key, stored as a repo Actions secret.
          MUTSU_SSH_KEY: ${{ secrets.MUTSU_SSH_KEY }}
        run: |
          set -euo pipefail
          OVERRIDE="${{ github.event.inputs.ssh_config }}"
          if [ -n "$OVERRIDE" ]; then
            # Ad-hoc/debug override: use an SSH config already present on the runner.
            [ -f "$OVERRIDE" ] || { echo "ERROR: ssh_config override '$OVERRIDE' not found" >&2; exit 1; }
            SSH_CONFIG="$OVERRIDE"
          else
            # Default: build a job-local SSH config from the MUTSU_SSH_KEY secret.
            # The runner job environment does NOT resolve the 'mutsu-agent' alias
            # (DNS), so we map it to mutsu's IP here and supply the key explicitly.
            [ -n "${MUTSU_SSH_KEY:-}" ] || { echo "ERROR: MUTSU_SSH_KEY secret is empty; see docs/ci-secrets.md" >&2; exit 1; }
            SSH_DIR="${GITHUB_WORKSPACE}/.ssh-mutsu"
            rm -rf "$SSH_DIR"; mkdir -p "$SSH_DIR"; chmod 700 "$SSH_DIR"
            ( umask 077; printf '%s\n' "$MUTSU_SSH_KEY" > "$SSH_DIR/id_mutsu" )
            chmod 600 "$SSH_DIR/id_mutsu"
            : > "$SSH_DIR/known_hosts"; chmod 600 "$SSH_DIR/known_hosts"
            {
              echo "Host mutsu-agent"
              echo "  HostName 10.0.42.41"
              echo "  User manitcor"
              echo "  IdentityFile ${SSH_DIR}/id_mutsu"
              echo "  IdentitiesOnly yes"
              echo "  UserKnownHostsFile ${SSH_DIR}/known_hosts"
              echo "  StrictHostKeyChecking accept-new"
              echo "  BatchMode yes"
            } > "$SSH_DIR/config"
            chmod 600 "$SSH_DIR/config"
            SSH_CONFIG="$SSH_DIR/config"
          fi
          echo "SSH_CONFIG=${SSH_CONFIG}" >> "$GITHUB_ENV"

          OZ="${{ github.event.inputs.ozone_platform || 'headless' }}"
          case "$OZ" in
            headless) VARIANTS="headless" ;;
            x11)      VARIANTS="x11" ;;
            both)     VARIANTS="headless x11" ;;
            *) echo "ERROR: unknown ozone_platform '$OZ'" >&2; exit 1 ;;
          esac
          echo "VARIANTS=${VARIANTS}" >> "$GITHUB_ENV"

          # Resolve publish: a release tag push always publishes (headless) so
          # the runtime-<hash> asset exists for the release re-dispatch below.
          # A manual dispatch honors its publish input (default false).
          if [ "${{ github.event_name }}" = "push" ]; then
            PUBLISH="true"
          else
            PUBLISH="${{ github.event.inputs.publish || 'false' }}"
          fi
          echo "PUBLISH=${PUBLISH}" >> "$GITHUB_ENV"
          echo "[arm64-build] event=${{ github.event_name }} ssh_config=${SSH_CONFIG} variants=[${VARIANTS}] publish=${PUBLISH}"

      - name: Preflight mutsu readiness
        run: |
          set -euo pipefail
          bash "${GITHUB_WORKSPACE}/.repo-clone/scripts/mutsu-build-linux-arm64.sh" \
            --ssh-config "${SSH_CONFIG}" \
            --preflight

      - name: Build (+ optionally publish) arm64 runtime per variant
        if: ${{ github.event.inputs.preflight_only != 'true' }}
        env:
          # `runtime-push.sh arm64` uploads the runtime asset to the runtime-<hash>
          # release — the same publish path (and same token) build-runtime.yml uses
          # for the x86_64 tarballs. CI artifact publishing uses the standard CI
          # token; it is not an authored "delivery" so it does not need a human
          # (roctinam) identity. The driver's `docker login -u roctinam` branch is
          # NOT reached on arm64 (the builder image is built locally in the VM, not
          # pulled), so there's no user/token mismatch. Only consumed when
          # publish=true; build-only and preflight runs need no token.
          GITEA_TOKEN: ${{ secrets.BUILD_REPO_TOKEN }}
        run: |
          set -euo pipefail
          PUBLISH="${PUBLISH:-false}"   # resolved in the SSH-setup step (true on tag push)
          JOBS="${{ github.event.inputs.ninja_jobs }}"
          SKIP_SYNC="${{ github.event.inputs.skip_sync || 'false' }}"

          publish_flag=()
          [ "$PUBLISH" = "true" ] && publish_flag=(--publish)
          jobs_flag=()
          [ -n "$JOBS" ] && jobs_flag=(--jobs "$JOBS")
          skip_flag=()
          [ "$SKIP_SYNC" = "true" ] && skip_flag=(--skip-sync)

          if [ "$PUBLISH" = "true" ] && [ -z "${GITEA_TOKEN:-}" ]; then
            echo "ERROR: publish=true but BUILD_REPO_TOKEN is empty; see docs/ci-secrets.md" >&2
            exit 1
          fi

          for variant in ${VARIANTS}; do
            echo "::group::build arm64 runtime — ozone=${variant} publish=${PUBLISH}"
            bash "${GITHUB_WORKSPACE}/.repo-clone/scripts/mutsu-build-linux-arm64.sh" \
              --ssh-config "${SSH_CONFIG}" \
              --ozone "${variant}" \
              "${jobs_flag[@]}" "${skip_flag[@]}" "${publish_flag[@]}"
            echo "::endgroup::"
          done

      - name: Attach arm64 to the release (re-dispatch release.yml)
        # Option A async attach: only on a release tag push, after a successful
        # publish. release.yml is create-or-reuse + idempotent, so re-running it
        # with include_linux_arm64=true pulls the now-published runtime-<hash>
        # arm64 tarball and attaches the arm64 installers to the existing release.
        # include_macos=false here — the macOS workflow re-dispatches for its own
        # triple independently.
        if: ${{ github.event_name == 'push' && github.event.inputs.preflight_only != 'true' }}
        env:
          DISPATCH_TOKEN: ${{ secrets.BUILD_REPO_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          [ -n "${DISPATCH_TOKEN:-}" ] || { echo "ERROR: BUILD_REPO_TOKEN empty; cannot re-dispatch release.yml" >&2; exit 1; }
          echo "[arm64-build] dispatching release.yml for ${TAG} (include_linux_arm64=true)"
          curl -fsS -X POST \
            -H "Authorization: token ${DISPATCH_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://git.integrolabs.net/api/v1/repos/${GITHUB_REPOSITORY}/actions/workflows/release.yml/dispatches" \
            -d "{\"ref\":\"${TAG}\",\"inputs\":{\"tag\":\"${TAG}\",\"include_linux_arm64\":\"true\",\"include_macos\":\"false\"}}"

      - name: Cleanup
        if: ${{ always() }}
        run: rm -rf "${GITHUB_WORKSPACE}/.repo-clone" "${GITHUB_WORKSPACE}/.ssh-mutsu" 2>/dev/null || true
