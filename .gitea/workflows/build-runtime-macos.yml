# build-runtime-macos.yml — CI-dispatched aarch64-apple-darwin runtime build.
#
# Runs on the always-available `ubuntu-latest` Gitea runner and drives the
# native macOS build on mutsu over SSH during the run (mutsu is NOT a Gitea
# runner — see docs/ci-runner-mutsu.md). This mirrors the HotM "build via
# mutsu" pattern: a standard runner SSHes to mutsu; mutsu does the compute.
#
# Previously ran on `runs-on: titan`; moved off titan because the macOS drop
# must not depend on the single titan runner being online (a queued titan job
# stalled the alpha.10/11 macOS asset — #227).
#
# Triggers:
#   - workflow_dispatch ONLY (build-only or publish). NO v* tag trigger:
#     build the macOS runtime here first (publish=true), then tag for release —
#     release.yml pulls the already-published asset. A tag must not kick off a
#     redundant ~3h rebuild. (#227/#228)
#
# SSH to mutsu: a job-local SSH config built from the MUTSU_SSH_KEY secret,
# connecting to 10.0.42.41 (user manitcor) via the `mutsu-agent` alias.
# Publish: scripts/mutsu-build-macos.sh --publish runs runtime-push.sh on mutsu,
# uploading aarch64-apple-darwin.tgz to the runtime-<hash> release with
# BUILD_REPO_TOKEN. release.yml --include_macos=true consumes it.

name: Build Runtime (macOS / mutsu)

on:
  # No v* tag trigger: runtimes are built (manually / on main) BEFORE a release
  # is tagged, so the tag must not kick off a redundant/failing mutsu build.
  # arm64-linux is deferred (#116); macOS is built on-demand then release.yml
  # pulls the published asset. (#227/#228)
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish the aarch64-apple-darwin runtime to the runtime-<hash> release (needs BUILD_REPO_TOKEN)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      ninja_jobs:
        description: 'ninja -j parallelism passed to the build (empty = builder default)'
        required: false
        default: ''
      ssh_config:
        description: 'Override: path to an SSH config already on the runner (default: build one from the MUTSU_SSH_KEY secret)'
        required: false
        default: ''

env:
  CARGO_TERM_COLOR: always
  # External-drive pin (mutsu system drive is too small for a Chromium build).
  MUTSU_CARBONYL_DIR: /Volumes/build/carbonyl

jobs:
  build-runtime-macos:
    name: Build aarch64-apple-darwin on mutsu (headless)
    runs-on: ubuntu-latest
    container:
      image: node:20-bookworm
    # In a container, Gitea/act runs `run:` steps with `sh` (dash) by default;
    # these steps use `set -o pipefail` + bash arrays, so force bash.
    defaults:
      run:
        shell: bash
    timeout-minutes: 600

    steps:
      - name: Install ssh/git/curl
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends openssh-client git curl ca-certificates

      - name: Checkout repo at the dispatched ref
        run: |
          set -euo pipefail
          rm -rf "${GITHUB_WORKSPACE}/.repo-clone" 2>/dev/null || true
          git clone --depth 1 --branch "${{ github.ref_name }}" \
            "https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git" \
            "${GITHUB_WORKSPACE}/.repo-clone"

      - name: Set up mutsu SSH (from MUTSU_SSH_KEY)
        env:
          MUTSU_SSH_KEY: ${{ secrets.MUTSU_SSH_KEY }}
        run: |
          set -euo pipefail
          OVERRIDE="${{ github.event.inputs.ssh_config }}"
          if [ -n "$OVERRIDE" ]; then
            [ -f "$OVERRIDE" ] || { echo "ERROR: ssh_config override '$OVERRIDE' not found" >&2; exit 1; }
            SSH_CONFIG="$OVERRIDE"
          else
            [ -n "${MUTSU_SSH_KEY:-}" ] || { echo "ERROR: MUTSU_SSH_KEY secret is empty; see docs/ci-secrets.md" >&2; exit 1; }
            SSH_DIR="${GITHUB_WORKSPACE}/.ssh-mutsu"
            rm -rf "$SSH_DIR"; mkdir -p "$SSH_DIR"; chmod 700 "$SSH_DIR"
            ( umask 077; printf '%s\n' "$MUTSU_SSH_KEY" > "$SSH_DIR/id_mutsu" )
            chmod 600 "$SSH_DIR/id_mutsu"
            : > "$SSH_DIR/known_hosts"; chmod 600 "$SSH_DIR/known_hosts"
            {
              echo "Host mutsu-agent"
              echo "  HostName 10.0.42.41"
              echo "  User manitcor"
              echo "  IdentityFile ${SSH_DIR}/id_mutsu"
              echo "  IdentitiesOnly yes"
              echo "  UserKnownHostsFile ${SSH_DIR}/known_hosts"
              echo "  StrictHostKeyChecking accept-new"
              echo "  BatchMode yes"
            } > "$SSH_DIR/config"
            chmod 600 "$SSH_DIR/config"
            SSH_CONFIG="$SSH_DIR/config"
          fi
          echo "SSH_CONFIG=${SSH_CONFIG}" >> "$GITHUB_ENV"

          if [ "${{ github.event_name }}" = "push" ]; then
            PUBLISH="true"
          else
            PUBLISH="${{ github.event.inputs.publish || 'false' }}"
          fi
          echo "PUBLISH=${PUBLISH}" >> "$GITHUB_ENV"
          echo "[macos-build] event=${{ github.event_name }} ssh_config=${SSH_CONFIG} publish=${PUBLISH}"

      - name: Build (+ optionally publish) macOS runtime
        env:
          GITEA_TOKEN: ${{ secrets.BUILD_REPO_TOKEN }}
        run: |
          set -euo pipefail
          JOBS="${{ github.event.inputs.ninja_jobs }}"
          publish_flag=()
          [ "${PUBLISH:-false}" = "true" ] && publish_flag=(--publish)
          jobs_flag=()
          [ -n "$JOBS" ] && jobs_flag=(--jobs "$JOBS")

          if [ "${PUBLISH:-false}" = "true" ] && [ -z "${GITEA_TOKEN:-}" ]; then
            echo "ERROR: publish requested but BUILD_REPO_TOKEN is empty; see docs/ci-secrets.md" >&2
            exit 1
          fi

          echo "::group::build macOS runtime — ozone=headless publish=${PUBLISH:-false}"
          bash "${GITHUB_WORKSPACE}/.repo-clone/scripts/mutsu-build-macos.sh" \
            --ssh-config "${SSH_CONFIG}" \
            --host mutsu-agent \
            --remote-dir "${MUTSU_CARBONYL_DIR}" \
            --ozone headless \
            "${jobs_flag[@]}" "${publish_flag[@]}"
          echo "::endgroup::"

      # NOTE (#228): no "re-dispatch release.yml" step here. This workflow is
      # workflow_dispatch-only — there is no v* tag/push trigger — so the macOS
      # runtime is built+published BEFORE a release is tagged, and release.yml
      # pulls the already-published asset. A dead CI job therefore cannot strand
      # the macOS asset on a tag release. The previous push-gated re-dispatch
      # step was unreachable (github.event_name is always workflow_dispatch).

      - name: Cleanup
        if: ${{ always() }}
        run: rm -rf "${GITHUB_WORKSPACE}/.repo-clone" "${GITHUB_WORKSPACE}/.ssh-mutsu" 2>/dev/null || true
