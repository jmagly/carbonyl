# check.yml — Fast CI: cargo check + clippy + lib tests
#
# Runs inside the pinned carbonyl-builder container so the toolchain is
# identical to build-runtime.yml and independent of titan's host Rust.
# Closes issue #50 (check.yml container migration) and prevents the
# clippy lint drift that broke CI when the host Rust upgraded without us.
#
# No Chromium source is required for this workflow — we only need the
# Rust side of the repo plus the rust-toolchain.toml pin.
#
# Triggered by: push to main, pull_request to main, workflow_dispatch

name: Check

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'build.rs'
      - 'rust-toolchain.toml'
      - 'build/Dockerfile.builder'
      - '.gitea/workflows/check.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      builder_image_tag:
        description: 'carbonyl-builder image tag (sha-<7>, or leave empty for latest)'
        required: false
        default: ''

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check & Lint
    runs-on: titan

    steps:
      - name: Resolve builder image
        run: |
          # Resolution order:
          #   1. workflow_dispatch input (manual override)
          #   2. .gitea/builder-image-pin in the repo at this commit
          #   3. :latest (fallback if pin file missing — see #66)
          TAG_INPUT="${{ github.event.inputs.builder_image_tag }}"
          if [ -n "$TAG_INPUT" ]; then
            TAG="$TAG_INPUT"; src="dispatch input"
          else
            PIN_URL="https://git.integrolabs.net/api/v1/repos/${GITHUB_REPOSITORY}/raw/.gitea/builder-image-pin?ref=${GITHUB_SHA:-main}"
            TAG="$(curl -sf -H "Authorization: token ${{ github.token }}" "$PIN_URL" 2>/dev/null | head -1 | tr -d '[:space:]' || true)"
            if [ -n "$TAG" ]; then
              src=".gitea/builder-image-pin"
            else
              TAG="latest"; src="fallback (pin file missing)"
              echo "[resolve] WARNING: no .gitea/builder-image-pin at ${GITHUB_SHA:-main}; using :latest" >&2
            fi
          fi
          IMAGE="git.integrolabs.net/roctinam/carbonyl-builder:${TAG}"
          echo "BUILDER_IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          echo "[resolve] using builder image: ${IMAGE} (from: $src)"

      - name: Log in to registry
        run: |
          echo "${{ secrets.BUILD_REPO_TOKEN }}" | \
            docker login git.integrolabs.net \
              -u "${{ github.actor }}" \
              --password-stdin

      - name: Pull builder image
        run: docker pull "${BUILDER_IMAGE}"

      - name: Checkout
        run: |
          rm -rf "${GITHUB_WORKSPACE}/.repo-clone" 2>/dev/null || true
          git clone --depth 1 --branch "${GITHUB_REF_NAME:-main}" \
            "https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git" \
            "${GITHUB_WORKSPACE}/.repo-clone"
          cd "${GITHUB_WORKSPACE}/.repo-clone"
          git checkout "${GITHUB_SHA:-HEAD}"

      - name: Verify pinned toolchain (in container)
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e CARGO_HOME=/tmp/cargo \
            -e RUSTUP_HOME=/usr/local/rustup \
            -v "${GITHUB_WORKSPACE}/.repo-clone:/workspace" \
            -w /workspace \
            "${BUILDER_IMAGE}" \
            bash -c 'rustc --version && cargo --version && cargo clippy --version'

      - name: cargo check (in container)
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e CARGO_HOME=/tmp/cargo \
            -e RUSTUP_HOME=/usr/local/rustup \
            -v "${GITHUB_WORKSPACE}/.repo-clone:/workspace" \
            -w /workspace \
            "${BUILDER_IMAGE}" \
            cargo check --target x86_64-unknown-linux-gnu

      - name: cargo clippy (in container)
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e CARGO_HOME=/tmp/cargo \
            -e RUSTUP_HOME=/usr/local/rustup \
            -v "${GITHUB_WORKSPACE}/.repo-clone:/workspace" \
            -w /workspace \
            "${BUILDER_IMAGE}" \
            cargo clippy --target x86_64-unknown-linux-gnu -- -D warnings

      - name: cargo test (lib, in container)
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e CARGO_HOME=/tmp/cargo \
            -e RUSTUP_HOME=/usr/local/rustup \
            -v "${GITHUB_WORKSPACE}/.repo-clone:/workspace" \
            -w /workspace \
            "${BUILDER_IMAGE}" \
            cargo test --lib --target x86_64-unknown-linux-gnu
