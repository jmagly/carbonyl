# build-runtime.yml — Full Chromium build and runtime upload
#
# Migrated to run inside the pinned builder container per issue #51.
# All build steps execute inside `git.integrolabs.net/roctinam/carbonyl-builder`
# (pinned by SHA tag; never :latest). The host retains only Docker +
# the Chromium source checkout at /srv/chromium/src on titan.
#
# Issue #57 adds the `ozone_platform` workflow_dispatch input so we can
# build either the legacy headless Ozone variant, the new x11 Ozone
# variant, or both as separate runtime tarballs (matrix). args.gn is
# edited in-place for the duration of each matrix job; the .bak in the
# "Restore args.gn" step keeps the canonical headless state on disk.
#
# Push-to-main fans out into a {headless, x11} matrix so release.yml's
# tag-push trigger always has both variants available without manual
# dispatch (#69 follow-up).
#
# Reference: Fortemi/fortemi .gitea/workflows/ci-builder.yaml
#            docs/ci-cd-plan.md §"Target architecture"
#
# Triggered by:
#   - workflow_dispatch (primary — manually trigger a runtime build)
#   - push to main when patch files, gclient config, or args.gn change

name: Build Runtime

on:
  workflow_dispatch:
    inputs:
      arch:
        description: 'Target architecture (amd64 or arm64)'
        required: false
        default: 'amd64'
      ozone_platform:
        description: 'Chromium Ozone platform variant to build'
        required: false
        default: 'headless'
        type: choice
        options:
          - headless
          - x11
          - both
      builder_image_tag:
        description: 'carbonyl-builder image tag (sha-<7>, or leave empty for latest)'
        required: false
        default: ''
      ninja_jobs:
        description: 'ninja -j parallelism (default: half of host cores)'
        required: false
        default: ''
  push:
    branches: [main]
    paths:
      - 'chromium/.gclient'
      - 'chromium/patches/**'
      - 'src/**'
      - 'src/browser/args.gn'
      - 'build/Dockerfile.builder'
      - '.gitea/workflows/build-runtime.yml'

env:
  CARGO_TERM_COLOR: always
  # Path on titan where the Chromium source + depot_tools live across CI runs.
  # Managed operationally (see docs/ci-runner-titan.md); not in this workflow's scope.
  HOST_CARBONYL_DIR: /srv/carbonyl
  HOST_CHROMIUM_SRC_DIR: /srv/carbonyl/chromium/src

jobs:
  # Compute the matrix as a separate job — Gitea Actions' expression
  # evaluator doesn't reliably handle chained `&& ||` patterns inside
  # `fromJSON()` at the strategy.matrix level (an inline expression
  # collapsed to an empty single-element matrix in run #6522). A tiny
  # prep job emitting the matrix JSON via $GITHUB_OUTPUT is the
  # canonical workaround.
  resolve-matrix:
    runs-on: titan
    outputs:
      ozones: ${{ steps.compute.outputs.ozones }}
    steps:
      - id: compute
        run: |
          INPUT="${{ github.event.inputs.ozone_platform }}"
          case "$INPUT" in
            headless) M='["headless"]' ;;
            x11)      M='["x11"]' ;;
            both|"")  M='["headless","x11"]' ;;
            *)        echo "ERROR: unknown ozone_platform '$INPUT'" >&2; exit 1 ;;
          esac
          echo "ozones=$M" >> "$GITHUB_OUTPUT"
          echo "[matrix] ozones=$M (input='$INPUT')"

  build-runtime:
    needs: resolve-matrix
    name: Build runtime (${{ matrix.ozone }} / ${{ github.event.inputs.arch || 'amd64' }})
    runs-on: titan
    timeout-minutes: 240
    strategy:
      # One titan runner serializes these anyway; explicit for clarity.
      # fail-fast=false so an x11 break doesn't kill an in-progress
      # headless build (or vice versa).
      fail-fast: false
      max-parallel: 1
      matrix:
        ozone: ${{ fromJSON(needs.resolve-matrix.outputs.ozones) }}

    steps:
      - name: Resolve builder image
        run: |
          # Resolution order:
          #   1. workflow_dispatch input (manual override)
          #   2. .gitea/builder-image-pin in the repo at this commit
          #   3. :latest (fallback if pin file missing — see #66)
          TAG_INPUT="${{ github.event.inputs.builder_image_tag }}"
          if [ -n "$TAG_INPUT" ]; then
            TAG="$TAG_INPUT"; src="dispatch input"
          else
            PIN_URL="https://git.integrolabs.net/api/v1/repos/${GITHUB_REPOSITORY}/raw/.gitea/builder-image-pin?ref=${GITHUB_SHA:-main}"
            TAG="$(curl -sf -H "Authorization: token ${{ github.token }}" "$PIN_URL" 2>/dev/null | head -1 | tr -d '[:space:]' || true)"
            if [ -n "$TAG" ]; then
              src=".gitea/builder-image-pin"
            else
              TAG="latest"; src="fallback (pin file missing)"
              echo "[resolve] WARNING: no .gitea/builder-image-pin at ${GITHUB_SHA:-main}; using :latest" >&2
            fi
          fi
          IMAGE="git.integrolabs.net/roctinam/carbonyl-builder:${TAG}"
          echo "BUILDER_IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          echo "[resolve] using builder image: ${IMAGE} (from: $src)"

      - name: Resolve ninja parallelism
        # Default: half of the host's core count, rounded down. Keeps other
        # processes on titan responsive.
        run: |
          J="${{ github.event.inputs.ninja_jobs }}"
          if [ -z "$J" ]; then
            CORES=$(nproc)
            J=$(( CORES / 2 ))
            [ "$J" -lt 1 ] && J=1
          fi
          echo "NINJA_JOBS=${J}" >> "$GITHUB_ENV"
          echo "[resolve] ninja parallelism: -j ${J}"

      - name: Log in to registry (for pulling the builder image)
        run: |
          # Use github.actor (Gitea aliases the github context). Fortemi pattern.
          echo "${{ secrets.BUILD_REPO_TOKEN }}" | \
            docker login git.integrolabs.net \
              -u "${{ github.actor }}" \
              --password-stdin

      - name: Pull builder image
        run: |
          docker pull "${BUILDER_IMAGE}"

      - name: Checkout carbonyl (workspace, not the source tree)
        run: |
          rm -rf "${GITHUB_WORKSPACE}/.repo-clone" 2>/dev/null || true
          git clone --depth 50 --branch "${GITHUB_REF_NAME:-main}" \
            "https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git" \
            "${GITHUB_WORKSPACE}/.repo-clone"
          cd "${GITHUB_WORKSPACE}/.repo-clone"
          git checkout "${GITHUB_SHA:-HEAD}"
          echo "[checkout] workspace: ${GITHUB_WORKSPACE}/.repo-clone"

      - name: Sync workspace → host Chromium checkout
        # The Chromium source checkout lives at HOST_CHROMIUM_SRC_DIR on titan,
        # NOT in the workspace. We sync the patch set, scripts, and args.gn
        # from the workspace into HOST_CARBONYL_DIR so the in-container build
        # uses this commit's files.
        run: |
          test -d "${HOST_CHROMIUM_SRC_DIR}" || {
            echo "[sync] ERROR: ${HOST_CHROMIUM_SRC_DIR} missing on titan."
            echo "  Run titan bootstrap first; see docs/ci-runner-titan.md."
            exit 1
          }
          # Sync changed files from workspace to host repo dir.
          # Excludes preserve the pre-existing 150 GB Chromium checkout.
          rsync -a \
            --exclude='.git/' \
            --exclude='chromium/src/' \
            --exclude='chromium/depot_tools/' \
            --exclude='target/' \
            "${GITHUB_WORKSPACE}/.repo-clone/" "${HOST_CARBONYL_DIR}/"

      - name: Apply Ozone platform override for this build
        # Non-destructive: we keep a backup of args.gn so the host checkout
        # retains its canonical headless state across runs.
        run: |
          OZONE="${{ matrix.ozone }}"
          ARGS_FILE="${HOST_CARBONYL_DIR}/src/browser/args.gn"

          cp "${ARGS_FILE}" "${ARGS_FILE}.bak"
          case "${OZONE}" in
            headless)
              echo "[ozone] keeping args.gn as-is (headless default)"
              ;;
            x11)
              # Switch to x11 Ozone. Per the W0.1 paper audit
              # (.aiwg/reports/phase0-w01-patch-audit.md) this should apply
              # cleanly at the patch level; runtime validation of the 5
              # yellow patches happens during the build's first runtime
              # smoke test.
              sed -i 's/^ozone_platform = "headless"/ozone_platform = "x11"/' "${ARGS_FILE}"
              sed -i 's/^ozone_platform_x11 = false/ozone_platform_x11 = true/' "${ARGS_FILE}"
              # x11 Ozone needs xkbcommon for keyboard layout handling.
              sed -i 's/^use_xkbcommon = false/use_xkbcommon = true/' "${ARGS_FILE}"
              echo "[ozone] switched args.gn to x11"
              grep -E "^ozone_platform|^use_xkbcommon" "${ARGS_FILE}"
              ;;
            both)
              # Build BOTH ozone platforms in one binary — supports Phase 0
              # W0.6 text-render parity tests (same carbonyl binary, two
              # ozone targets selectable via --ozone-platform runtime flag).
              sed -i 's/^ozone_platform = "headless"/ozone_platform = "headless"/' "${ARGS_FILE}"
              sed -i 's/^ozone_platform_x11 = false/ozone_platform_x11 = true/' "${ARGS_FILE}"
              sed -i 's/^use_xkbcommon = false/use_xkbcommon = true/' "${ARGS_FILE}"
              # ozone_platform_headless defaults to true; leave alone.
              echo "[ozone] built both headless + x11 (--ozone-platform selects at runtime)"
              ;;
            *)
              echo "[ozone] ERROR: unknown ozone_platform: ${OZONE}" >&2
              exit 1
              ;;
          esac

      - name: Reset Chromium source to clean state (in container)
        # Belt-and-suspenders against the state leftover from prior failed
        # builds. patches.sh expects a clean tree (at either the patched
        # or upstream-baseline HEAD). Interrupted prior runs can leave
        # embedded git repos under third_party/* in an "added" state that
        # blocks `git am`. This step resets + cleans up.
        run: |
          docker run --rm \
            -v "${HOST_CARBONYL_DIR}:${HOST_CARBONYL_DIR}" \
            -w ${HOST_CARBONYL_DIR} \
            "${BUILDER_IMAGE}" \
            bash -c '
              git config --global --add safe.directory "*"
              for d in ${HOST_CHROMIUM_SRC_DIR} ${HOST_CHROMIUM_SRC_DIR}/third_party/skia ${HOST_CHROMIUM_SRC_DIR}/third_party/webrtc; do
                if [ -d "$d/.git" ]; then
                  echo "[reset] cleaning $d"
                  cd "$d"
                  # Clean up interrupted git am / rebase state first.
                  git am --abort 2>/dev/null || true
                  git rebase --abort 2>/dev/null || true
                  git reset --hard HEAD
                  git clean -fd || true
                fi
              done
            '

      - name: Apply patches to Chromium source (in container)
        run: |
          docker run --rm \
            -v "${HOST_CARBONYL_DIR}:${HOST_CARBONYL_DIR}" \
            -e CARBONYL_ROOT=${HOST_CARBONYL_DIR} \
            -e CHROMIUM_ROOT=${HOST_CARBONYL_DIR}/chromium \
            -e CHROMIUM_SRC=${HOST_CHROMIUM_SRC_DIR} \
            -e DEPOT_TOOLS_ROOT=${HOST_CARBONYL_DIR}/chromium/depot_tools \
            -w ${HOST_CARBONYL_DIR} \
            "${BUILDER_IMAGE}" \
            bash -c '
              # Belt-and-suspenders: set git config at runtime too, so this
              # works against a pre-fix builder image. New images bake this in.
              git config --global --add safe.directory "*"
              git config --global user.email "ci@carbonyl.local"
              git config --global user.name "Carbonyl CI"
              source scripts/env.sh
              bash scripts/patches.sh apply
            '

      - name: Run gn gen (in container)
        run: |
          CPU="${{ github.event.inputs.arch || 'amd64' }}"
          # scripts/build.sh and scripts/copy-binaries.sh prepend "out/"
          # themselves; pass OUT_DIR as just the subdir name.
          OUT_DIR="Default-${{ matrix.ozone }}"
          docker run --rm \
            -v "${HOST_CARBONYL_DIR}:${HOST_CARBONYL_DIR}" \
            -e CARBONYL_ROOT=${HOST_CARBONYL_DIR} \
            -e CHROMIUM_SRC=${HOST_CHROMIUM_SRC_DIR} \
            -e DEPOT_TOOLS_ROOT=${HOST_CARBONYL_DIR}/chromium/depot_tools \
            -w ${HOST_CARBONYL_DIR} \
            "${BUILDER_IMAGE}" \
            bash -c "
              source scripts/env.sh
              cp ${HOST_CARBONYL_DIR}/src/browser/args.gn ${HOST_CHROMIUM_SRC_DIR}/out/${OUT_DIR}/args.gn 2>/dev/null || {
                mkdir -p ${HOST_CHROMIUM_SRC_DIR}/out/${OUT_DIR}
                cp ${HOST_CARBONYL_DIR}/src/browser/args.gn ${HOST_CHROMIUM_SRC_DIR}/out/${OUT_DIR}/args.gn
              }
              cd ${HOST_CHROMIUM_SRC_DIR}
              gn gen out/${OUT_DIR}
            "
          echo "OUT_DIR=${OUT_DIR}" >> "$GITHUB_ENV"

      - name: Build libcarbonyl (Rust, in container)
        run: |
          CPU="${{ github.event.inputs.arch || 'amd64' }}"
          docker run --rm \
            -v "${HOST_CARBONYL_DIR}:${HOST_CARBONYL_DIR}" \
            -e CARBONYL_ROOT=${HOST_CARBONYL_DIR} \
            -e CHROMIUM_SRC=${HOST_CHROMIUM_SRC_DIR} \
            -w ${HOST_CARBONYL_DIR} \
            "${BUILDER_IMAGE}" \
            bash -c "bash scripts/build.sh ${OUT_DIR} ${CPU} -j ${NINJA_JOBS}"

      - name: Build headless_shell (Chromium, in container)
        run: |
          docker run --rm \
            -v "${HOST_CARBONYL_DIR}:${HOST_CARBONYL_DIR}" \
            -e CARBONYL_ROOT=${HOST_CARBONYL_DIR} \
            -e CHROMIUM_SRC=${HOST_CHROMIUM_SRC_DIR} \
            -e DEPOT_TOOLS_ROOT=${HOST_CARBONYL_DIR}/chromium/depot_tools \
            -w ${HOST_CARBONYL_DIR} \
            "${BUILDER_IMAGE}" \
            bash -c "
              source scripts/env.sh
              ninja -C ${HOST_CHROMIUM_SRC_DIR}/out/${OUT_DIR} -j ${NINJA_JOBS} headless:headless_shell
            "

      - name: Copy runtime binaries
        run: |
          CPU="${{ github.event.inputs.arch || 'amd64' }}"
          OZONE="${{ matrix.ozone }}"
          docker run --rm \
            -v "${HOST_CARBONYL_DIR}:${HOST_CARBONYL_DIR}" \
            -e CARBONYL_ROOT=${HOST_CARBONYL_DIR} \
            -e CHROMIUM_SRC=${HOST_CHROMIUM_SRC_DIR} \
            -w ${HOST_CARBONYL_DIR} \
            "${BUILDER_IMAGE}" \
            bash -c "bash scripts/copy-binaries.sh ${OUT_DIR} ${CPU}"
          TRIPLE=$(bash "${HOST_CARBONYL_DIR}/scripts/platform-triple.sh" "${CPU}")
          echo "TRIPLE=${TRIPLE}" >> "$GITHUB_ENV"
          ls -lh "${HOST_CARBONYL_DIR}/build/pre-built/${TRIPLE}/" | head

      - name: Smoke test binary
        run: |
          TRIPLE="${{ env.TRIPLE }}"
          OZONE="${{ matrix.ozone }}"
          BINARY="${HOST_CARBONYL_DIR}/build/pre-built/${TRIPLE}/carbonyl"
          LD_LIBRARY_PATH="${HOST_CARBONYL_DIR}/build/pre-built/${TRIPLE}" \
            "${BINARY}" --version
          echo "[smoke] built carbonyl ${OZONE}/${TRIPLE}"

      - name: Restore args.gn to canonical state
        # So the next CI run sees the canonical (headless) args.gn, not our
        # temporary x11 override.
        if: always()
        run: |
          ARGS_FILE="${HOST_CARBONYL_DIR}/src/browser/args.gn"
          if [ -f "${ARGS_FILE}.bak" ]; then
            mv "${ARGS_FILE}.bak" "${ARGS_FILE}"
            echo "[cleanup] restored args.gn"
          fi

      - name: Upload runtime to Gitea releases
        env:
          GITEA_TOKEN: ${{ secrets.BUILD_REPO_TOKEN }}
        run: |
          CPU="${{ github.event.inputs.arch || 'amd64' }}"
          OZONE="${{ matrix.ozone }}"
          cd "${HOST_CARBONYL_DIR}"
          # runtime-push.sh hashes the tarball and uploads as runtime-<hash>.
          # For x11/both variants, prepend the ozone tag so different variants
          # don't collide on hash if content happens to match.
          CARBONYL_OZONE_TAG="${OZONE}" bash scripts/runtime-push.sh "${CPU}"

      - name: Upload tarball as workflow artifact
        uses: actions/upload-artifact@v3
        with:
          name: runtime-${{ matrix.ozone }}-${{ env.TRIPLE }}
          path: ${{ env.HOST_CARBONYL_DIR }}/build/pre-built/${{ env.TRIPLE }}.tgz
          retention-days: 30

      # ── X-mirror dual-output validation ──────────────────────────────────
      # Only meaningful for the x11 ozone variant — the X-mirror code in
      # x_mirror.cc is gated on CARBONYL_X_MIRROR=1 AND a real X display.
      # For headless builds the binary still has the code but no $DISPLAY,
      # so the test wouldn't exercise the path.
      #
      # Builds the qa-runner image fresh from carbonyl-agent's Dockerfile,
      # pointed at the just-published x11 runtime release we made in the
      # "Upload runtime to Gitea releases" step. Then runs the test
      # harness inside the container.
      #
      # On failure: blocks the workflow (release is already published, but
      # the next pipeline that depends on it will see the failed run and
      # operators can re-dispatch with a fix).
      - name: Build qa-runner image (x11 variant only)
        if: matrix.ozone == 'x11'
        env:
          GITEA_TOKEN: ${{ secrets.BUILD_REPO_TOKEN }}
        run: |
          cd "${HOST_CARBONYL_DIR}"
          HASH="$(bash scripts/runtime-hash.sh)"
          RUNTIME_URL="https://git.integrolabs.net/roctinam/carbonyl/releases/download/runtime-x11-${HASH}/${TRIPLE}.tgz"
          echo "[qa-runner] runtime URL: ${RUNTIME_URL}"

          QA_DIR="${GITHUB_WORKSPACE}/.qa-runner-clone"
          rm -rf "${QA_DIR}"
          git clone --depth 1 \
            "https://token:${{ github.token }}@git.integrolabs.net/roctinam/carbonyl-agent.git" \
            "${QA_DIR}"

          docker build \
            --build-arg "CARBONYL_RUNTIME_URL=${RUNTIME_URL}" \
            -t "carbonyl-agent-qa-runner:test-${GITHUB_SHA::7}" \
            "${QA_DIR}/docker/qa-runner/"
          echo "QA_RUNNER_IMAGE=carbonyl-agent-qa-runner:test-${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Run dual-output validation (x11 variant only)
        if: matrix.ozone == 'x11'
        run: |
          docker run --rm \
            --device=/dev/uinput \
            --user 0 \
            -v "${HOST_CARBONYL_DIR}:/repo:ro" \
            -e CARBONYL_GPU_MODE=cpu \
            "${QA_RUNNER_IMAGE}" \
            bash -c '
              # Pillow needed by the pixel-histogram assertion. Install in
              # the running container; the qa-runner base image keeps its
              # default surface lean.
              if ! python3 -c "import PIL" 2>/dev/null; then
                apt-get update >/dev/null 2>&1
                apt-get install -y --no-install-recommends python3-pil >/dev/null 2>&1
              fi
              CAPTURE_SECONDS=12 bash /repo/scripts/test-x-mirror.sh
            '

      - name: Cleanup qa-runner image
        if: always() && matrix.ozone == 'x11'
        run: |
          docker rmi "${QA_RUNNER_IMAGE:-}" 2>/dev/null || true
          rm -rf "${GITHUB_WORKSPACE}/.qa-runner-clone" || true
