# release.yml — Publish a Carbonyl release on v* tag push.
#
# Pulls the matching `runtime-<hash>` (or `runtime-x11-<hash>`)
# tarballs already built by build-runtime.yml, repackages each under
# the semantic version filename, creates a Gitea release at the v*
# tag, uploads the assets, and mirrors the release to GitHub.
#
# Hard constraint: this workflow NEVER rebuilds Chromium. If a
# matching runtime release isn't found, fail early with an
# actionable error pointing at build-runtime.yml. Rebuilding here
# would produce artefacts whose hash doesn't match what
# build-runtime published — silent drift bug waiting to happen.
#
# Triggers:
#   - push of a `v*` tag → automatic, ozone variants = "both"
#   - workflow_dispatch with `tag` input → manual re-run / fix-up
#
# Refs: roctinam/carbonyl#52, #65
# Secrets: BUILD_REPO_TOKEN (Gitea), GH_MIRROR_TOKEN (GitHub).
# See docs/ci-secrets.md.

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing v* tag to publish (no leading refs/tags/)'
        required: true
      ozone_platform:
        description: 'Which ozone variant(s) to package: both | headless | x11'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - headless
          - x11
      builder_image_tag:
        description: 'carbonyl-builder image tag (sha-<7>, latest, or empty for the repo pin)'
        required: false
        default: ''
      include_macos:
        description: 'Include the aarch64-apple-darwin (macOS) runtime. workflow_dispatch fails loudly if the asset is missing; tag-push auto-skips with a warning.'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      include_linux_arm64:
        description: 'Include the aarch64-unknown-linux-gnu runtime; fails loudly if its runtime asset is missing'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  CARGO_TERM_COLOR: always
  HOST_CARBONYL_DIR: /srv/carbonyl

jobs:
  release:
    name: Publish ${{ github.event.inputs.tag || github.ref_name }}
    runs-on: titan
    timeout-minutes: 30

    steps:
      - name: Resolve tag, version, target platforms, builder image
        run: |
          # ref_name is "v0.2.0-alpha.2" on tag push; input.tag for manual.
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          [ -n "$TAG" ] || { echo "ERROR: no tag resolved" >&2; exit 1; }
          # Strip leading "v" for the version string in filenames.
          VERSION="${TAG#v}"

          # Ozone variants list. Tag-push trigger and the default
          # workflow_dispatch input both resolve to "both" — push-to-main
          # in build-runtime.yml fans out into a {headless,x11} matrix,
          # so by tag-push time both runtime tarballs are always present.
          # (closes #65, refs #69)
          OZONE_INPUT="${{ github.event.inputs.ozone_platform || 'both' }}"
          case "${OZONE_INPUT}" in
            both)         OZONE_VARIANTS="headless x11" ;;
            headless|x11) OZONE_VARIANTS="${OZONE_INPUT}" ;;
            *) echo "ERROR: unknown ozone_platform '${OZONE_INPUT}'" >&2; exit 1 ;;
          esac

          # macOS (aarch64-apple-darwin) inclusion — default on (#113).
          # macOS is headless-only and its tarball lives on the shared
          # runtime-<hash> release alongside the Linux x86_64 tarball.
          # Missing-asset handling differs by trigger (see the verify step
          # below): a tag-push auto-skips macOS with a warning so routine
          # releases never fail on the not-yet-built arm runtime (#116),
          # while an explicit workflow_dispatch with include_macos=true
          # still fails loudly so a deliberate macOS cut can't silently
          # drop the architecture.
          INCLUDE_MACOS="${{ github.event.inputs.include_macos || 'true' }}"

          # Linux triples. x86_64 is always published. aarch64 Linux is
          # opt-in until #116 has published the runtime asset; when requested
          # the verification/download gates below require the asset and fail
          # loudly rather than silently dropping the architecture (#108).
          INCLUDE_LINUX_ARM64="${{ github.event.inputs.include_linux_arm64 || 'false' }}"
          case "${INCLUDE_LINUX_ARM64}" in
            true)  LINUX_TRIPLES="x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu" ;;
            false) LINUX_TRIPLES="x86_64-unknown-linux-gnu" ;;
            *) echo "ERROR: unknown include_linux_arm64 '${INCLUDE_LINUX_ARM64}'" >&2; exit 1 ;;
          esac

          # Builder image resolution — same order as check.yml /
          # build-runtime.yml: dispatch input → .gitea/builder-image-pin
          # → :latest fallback. See #66.
          BUILDER_TAG_INPUT="${{ github.event.inputs.builder_image_tag }}"
          if [ -n "$BUILDER_TAG_INPUT" ]; then
            BUILDER_TAG="$BUILDER_TAG_INPUT"; bsrc="dispatch input"
          else
            PIN_URL="https://git.integrolabs.net/api/v1/repos/${GITHUB_REPOSITORY}/raw/.gitea/builder-image-pin?ref=${GITHUB_SHA:-main}"
            BUILDER_TAG="$(curl -sf -H "Authorization: token ${{ github.token }}" "$PIN_URL" 2>/dev/null | head -1 | tr -d '[:space:]' || true)"
            if [ -n "$BUILDER_TAG" ]; then
              bsrc=".gitea/builder-image-pin"
            else
              BUILDER_TAG="latest"; bsrc="fallback (pin file missing)"
              echo "[release] WARNING: no .gitea/builder-image-pin; using :latest" >&2
            fi
          fi
          IMAGE="git.integrolabs.net/roctinam/carbonyl-builder:${BUILDER_TAG}"
          echo "[release] builder image: ${IMAGE} (from: $bsrc)"

          echo "TAG=${TAG}"                       >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}"               >> "$GITHUB_ENV"
          echo "OZONE_INPUT=${OZONE_INPUT}"       >> "$GITHUB_ENV"
          echo "OZONE_VARIANTS=${OZONE_VARIANTS}" >> "$GITHUB_ENV"
          echo "LINUX_TRIPLES=${LINUX_TRIPLES}"   >> "$GITHUB_ENV"
          echo "BUILDER_IMAGE=${IMAGE}"           >> "$GITHUB_ENV"
          echo "INCLUDE_MACOS=${INCLUDE_MACOS}"   >> "$GITHUB_ENV"
          echo "INCLUDE_LINUX_ARM64=${INCLUDE_LINUX_ARM64}" >> "$GITHUB_ENV"
          echo "[release] tag=${TAG} version=${VERSION} variants=[${OZONE_VARIANTS}] linux_triples=[${LINUX_TRIPLES}] include_macos=${INCLUDE_MACOS}"

      - name: Validate token presence
        run: |
          if [ -z "${{ secrets.BUILD_REPO_TOKEN }}" ]; then
            echo "ERROR: BUILD_REPO_TOKEN not set; see docs/ci-secrets.md" >&2; exit 1
          fi
          if [ -z "${{ secrets.GH_MIRROR_TOKEN }}" ]; then
            echo "ERROR: GH_MIRROR_TOKEN not set; see docs/ci-secrets.md" >&2; exit 1
          fi

      - name: Log in to Gitea container registry
        run: |
          echo "${{ secrets.BUILD_REPO_TOKEN }}" | \
            docker login git.integrolabs.net \
              -u "${{ github.actor }}" --password-stdin

      - name: Pull builder image
        run: docker pull "${BUILDER_IMAGE}"

      - name: Checkout repo at the tag
        run: |
          rm -rf "${GITHUB_WORKSPACE}/.repo-clone" 2>/dev/null || true
          git clone --depth 1 --branch "${TAG}" \
            "https://token:${{ github.token }}@git.integrolabs.net/${GITHUB_REPOSITORY}.git" \
            "${GITHUB_WORKSPACE}/.repo-clone"

      - name: Compute runtime hash for the tagged commit
        run: |
          # The hash is variant-independent (computed over patches +
          # bridge sources, identical for headless and x11). Run inside
          # the builder container so PATH / env match what
          # build-runtime.yml used at the time of publication.
          HASH="$(docker run --rm \
            -v "${GITHUB_WORKSPACE}/.repo-clone:/workspace" \
            -w /workspace \
            "${BUILDER_IMAGE}" \
            bash scripts/runtime-hash.sh)"
          [ -n "$HASH" ] || { echo "ERROR: runtime-hash.sh returned empty" >&2; exit 1; }
          echo "HASH=${HASH}" >> "$GITHUB_ENV"
          echo "[release] runtime hash: ${HASH}"

      - name: Verify all requested Linux runtime assets exist (no Chromium rebuild here!)
        env:
          GITEA_TOKEN: ${{ secrets.BUILD_REPO_TOKEN }}
        run: |
          API_BASE="https://git.integrolabs.net/api/v1/repos/${GITHUB_REPOSITORY}/releases/tags"
          missing=0
          for ozone in ${OZONE_VARIANTS}; do
            if [ "$ozone" = "headless" ]; then
              runtime_tag="runtime-${HASH}"
            else
              runtime_tag="runtime-${ozone}-${HASH}"
            fi
            release_json="$(curl -sf -H "Authorization: token ${GITEA_TOKEN}" "${API_BASE}/${runtime_tag}" 2>/dev/null || true)"
            if [ -z "${release_json}" ]; then
              echo "ERROR: runtime release '${runtime_tag}' not found." >&2
              echo "       Build it first: trigger build-runtime.yml with" >&2
              echo "       ozone_platform=${ozone} on the tagged commit." >&2
              missing=1
              continue
            fi
            echo "[release] runtime release '${runtime_tag}' present"
            for triple in ${LINUX_TRIPLES}; do
              asset="${triple}.tgz"
              if printf '%s' "${release_json}" | jq -e --arg name "${asset}" '.assets[] | select(.name == $name)' >/dev/null; then
                echo "[release] runtime asset '${runtime_tag}/${asset}' present"
              else
                echo "ERROR: runtime asset '${asset}' not found on '${runtime_tag}'." >&2
                echo "       Build and publish it first, then re-run this workflow." >&2
                echo "       For Linux arm64 (#116): publish aarch64-unknown-linux-gnu.tgz before setting include_linux_arm64=true." >&2
                missing=1
              fi
            done
          done
          if [ "$missing" -ne 0 ]; then
            echo "" >&2
            echo "       Releasing without all requested variants would silently" >&2
            echo "       drift artefacts. Publish the missing runtime asset(s)," >&2
            echo "       then re-run this workflow." >&2
            exit 1
          fi

      - name: Verify macOS runtime asset exists (#113)
        env:
          GITEA_TOKEN: ${{ secrets.BUILD_REPO_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "${INCLUDE_MACOS}" != "true" ]; then
            echo "[release] include_macos=false — skipping macOS runtime"
            exit 0
          fi
          # macOS is headless-only; the aarch64-apple-darwin tarball is
          # published onto the shared headless runtime-<hash> release by
          # scripts/runtime-push.sh arm64 (run on mutsu — docs/ci-runner-mutsu.md).
          runtime_tag="runtime-${HASH}"
          API_BASE="https://git.integrolabs.net/api/v1/repos/${GITHUB_REPOSITORY}/releases/tags"
          asset_json="$(curl -sf -H "Authorization: token ${GITEA_TOKEN}" "${API_BASE}/${runtime_tag}" \
            | jq -r '.assets[] | select(.name == "aarch64-apple-darwin.tgz")' 2>/dev/null || true)"
          if [ -n "${asset_json}" ]; then
            asset_size="$(echo "${asset_json}" | jq -r '.size')"
            asset_url="$(echo "${asset_json}" | jq -r '.browser_download_url // empty')"
            echo "[release] macOS runtime asset present on ${runtime_tag}: aarch64-apple-darwin.tgz (${asset_size} bytes)"
            [ -n "${asset_url}" ] && echo "[release] macOS runtime asset url: ${asset_url}"
            exit 0
          fi

          # Asset absent. Two paths (#113, #116):
          #   - workflow_dispatch with include_macos=true is an explicit
          #     operator opt-in: fail loudly so a deliberate macOS cut never
          #     silently drops the architecture.
          #   - a v* tag push always defaults include_macos=true but the arm
          #     macOS runtime isn't built for every hash yet (pending
          #     dedicated hardware, #116). Don't fail the routine release —
          #     warn, drop macOS from this run, and let the Linux assets
          #     publish. Downstream staging keys off INCLUDE_MACOS, so
          #     flipping it to false here skips the macOS stage step.
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "ERROR: macOS runtime 'aarch64-apple-darwin.tgz' not found on '${runtime_tag}'." >&2
            echo "       You requested include_macos=true explicitly." >&2
            echo "       Build and publish it on mutsu for this hash:" >&2
            echo "         GITEA_TOKEN=<token> bash scripts/mutsu-build-macos.sh --jobs 2 --publish" >&2
            echo "       OR re-run this workflow with include_macos=false for a Linux-only release." >&2
            exit 1
          fi
          echo "::warning::macOS runtime 'aarch64-apple-darwin.tgz' absent on ${runtime_tag}; auto-skipping macOS for this tag-push release (arm macOS runtime pending, #116)."
          echo "[release] To include macOS: build it on mutsu, then re-run via" >&2
          echo "[release] workflow_dispatch with include_macos=true (which fails loudly if still absent)." >&2
          echo "INCLUDE_MACOS=false" >> "$GITHUB_ENV"

      - name: Download and repackage Linux runtime tarballs (per variant and triple)
        env:
          GITEA_TOKEN: ${{ secrets.BUILD_REPO_TOKEN }}
        run: |
          STAGE="${GITHUB_WORKSPACE}/.release-stage"
          rm -rf "${STAGE}" && mkdir -p "${STAGE}"

          for ozone in ${OZONE_VARIANTS}; do
            if [ "$ozone" = "headless" ]; then
              runtime_tag="runtime-${HASH}"
            else
              runtime_tag="runtime-${ozone}-${HASH}"
            fi

            for triple in ${LINUX_TRIPLES}; do
              if [ "$ozone" = "headless" ]; then
                # Preserve the historical headless naming convention from
                # v0.2.0-alpha.1 release notes (no ozone tag in filename).
                asset_name="carbonyl-${VERSION}-${triple}.tgz"
              else
                asset_name="carbonyl-${VERSION}-${ozone}-${triple}.tgz"
              fi

              url="https://git.integrolabs.net/${GITHUB_REPOSITORY}/releases/download/${runtime_tag}/${triple}.tgz"
              tmp="${STAGE}/.dl-${ozone}-${triple}.tgz"
              curl -sfL -H "Authorization: token ${GITEA_TOKEN}" -o "${tmp}" "${url}"
              tar -tzf "${tmp}" >/dev/null
              mv "${tmp}" "${STAGE}/${asset_name}"

              # sha256 alongside each tarball; carbonyl-agent install
              # already uses these to verify downloads.
              ( cd "${STAGE}" && sha256sum "${asset_name}" > "${asset_name}.sha256" )
              echo "[release] staged ${asset_name} ($(du -h "${STAGE}/${asset_name}" | cut -f1))"
            done
          done

          ls -lh "${STAGE}"
          echo "STAGE=${STAGE}" >> "$GITHUB_ENV"

      - name: Stage macOS (aarch64-apple-darwin) asset (#113)
        env:
          GITEA_TOKEN: ${{ secrets.BUILD_REPO_TOKEN }}
        run: |
          if [ "${INCLUDE_MACOS}" != "true" ]; then
            echo "[release] include_macos=false — not staging macOS asset"
            exit 0
          fi
          # Headless-only; pulled from the shared runtime-<hash> release.
          # Staged into the same STAGE dir, so the Gitea-upload and
          # GitHub-mirror steps below carry it with no further changes.
          runtime_tag="runtime-${HASH}"
          asset_name="carbonyl-${VERSION}-aarch64-apple-darwin.tgz"
          url="https://git.integrolabs.net/${GITHUB_REPOSITORY}/releases/download/${runtime_tag}/aarch64-apple-darwin.tgz"
          tmp="${STAGE}/.dl-macos.tgz"
          curl -sfL -H "Authorization: token ${GITEA_TOKEN}" -o "${tmp}" "${url}"
          tar -tzf "${tmp}" >/dev/null
          mv "${tmp}" "${STAGE}/${asset_name}"
          ( cd "${STAGE}" && sha256sum "${asset_name}" > "${asset_name}.sha256" )
          echo "[release] staged ${asset_name} ($(du -h "${STAGE}/${asset_name}" | cut -f1))"
          ls -lh "${STAGE}"

      - name: Build Linux native install packages — deb/rpm/AppImage (#129, #138)
        run: |
          # Native installers for the x86_64 headless runtime, dropped into STAGE
          # so the Gitea upload + GitHub mirror loops below carry them (with
          # .sha256). macOS .pkg/.dmg are produced separately on mutsu
          # (scripts/mutsu-package-macos.sh) since only macOS runs pkgbuild. ADR-003.
          #
          # Built INSIDE an ubuntu:24.04 container (#138): the AppImage bundles its
          # full shared-library closure for a bare host, and the closure walk can
          # only copy libraries that are actually installed. Building in a clean,
          # deps-provisioned container makes the AppImage reproducible and
          # independent of whatever happens to be installed on the titan host.
          # Sequence: build deb+rpm (no deps needed) → apt-install the deb to
          # provision the validated runtime closure (NSS/fontconfig/glib/... + the
          # NSS PKCS#11 modules NSS dlopens) → build the AppImage with libs present.
          set -euo pipefail
          hl_tgz="${STAGE}/carbonyl-${VERSION}-x86_64-unknown-linux-gnu.tgz"
          if [ ! -f "$hl_tgz" ]; then
            echo "ERROR: headless x86_64 tarball not staged ($hl_tgz); cannot build Linux packages" >&2
            exit 1
          fi
          work="${GITHUB_WORKSPACE}/.pkg-linux"
          rm -rf "$work" && mkdir -p "$work/payload" "$work/out"
          tar xzf "$hl_tgz" -C "$work/payload"
          payload_dir="$(find "$work/payload" -maxdepth 1 -type d -name 'x86_64-unknown-linux-gnu' | head -1)"
          [ -n "$payload_dir" ] || { echo "ERROR: payload dir not found inside $hl_tgz" >&2; exit 1; }
          rel_payload="${payload_dir#"${GITHUB_WORKSPACE}/"}"
          uid="$(id -u)"; gid="$(id -g)"
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/ws" \
            -e DEBIAN_FRONTEND=noninteractive \
            -e VERSION="${VERSION}" \
            -e REL_PAYLOAD="${rel_payload}" \
            -e HOST_UID="${uid}" -e HOST_GID="${gid}" \
            ubuntu:24.04 bash -euo pipefail -c '
              apt-get update -qq
              apt-get install -y -qq --no-install-recommends \
                curl ca-certificates file squashfs-tools desktop-file-utils zsync >/dev/null
              cd /ws/.repo-clone
              # deb + rpm first (nfpm needs no runtime deps installed)
              bash scripts/package-linux.sh \
                --payload "/ws/${REL_PAYLOAD}" --version "${VERSION}" --arch amd64 \
                --formats deb,rpm --out /ws/.pkg-linux/out
              # provision the validated runtime closure by installing the deb,
              # then build the self-contained AppImage against the present libs
              apt-get install -y -qq --no-install-recommends /ws/.pkg-linux/out/carbonyl_*_amd64.deb >/dev/null 2>&1
              bash scripts/package-linux.sh \
                --payload "/ws/${REL_PAYLOAD}" --version "${VERSION}" --arch amd64 \
                --formats appimage --out /ws/.pkg-linux/out
              chown -R "${HOST_UID}:${HOST_GID}" /ws/.pkg-linux
            '
          shopt -s nullglob
          staged=0
          for f in "$work/out"/*.deb "$work/out"/*.rpm "$work/out"/*.AppImage; do
            name="$(basename "$f")"
            cp "$f" "${STAGE}/${name}"
            ( cd "${STAGE}" && sha256sum "${name}" > "${name}.sha256" )
            echo "[release] staged native package ${name} ($(du -h "${STAGE}/${name}" | cut -f1))"
            staged=$((staged+1))
          done
          [ "$staged" -ge 1 ] || { echo "ERROR: no Linux packages produced" >&2; exit 1; }
          ls -lh "${STAGE}"

      - name: Render-smoke Linux packages — fail on missing runtime dep (#138)
        run: |
          # Install each package into a clean container matching its target distro
          # and render a real page with `carbonyl --dump-text`. A package whose
          # declared (.deb/.rpm) or bundled (.AppImage) dependency set is incomplete
          # fails HERE — in CI — instead of at the user's terminal. The AppImage is
          # checked on a BARE ubuntu (only ca-certificates), proving self-containment.
          set -euo pipefail
          out="${GITHUB_WORKSPACE}/.pkg-linux/out"
          deb="$(ls "$out"/*.deb 2>/dev/null | head -1 || true)"
          rpm="$(ls "$out"/*.rpm 2>/dev/null | head -1 || true)"
          appimage="$(ls "$out"/*.AppImage 2>/dev/null | head -1 || true)"
          args=()
          [ -n "$deb" ]      && args+=(--deb "$deb")
          [ -n "$rpm" ]      && args+=(--rpm "$rpm")
          [ -n "$appimage" ] && args+=(--appimage "$appimage")
          [ "${#args[@]}" -ge 2 ] || { echo "ERROR: expected deb+rpm+appimage to smoke" >&2; exit 1; }
          bash "${GITHUB_WORKSPACE}/.repo-clone/scripts/smoke-packages.sh" "${args[@]}"
          rm -rf "${GITHUB_WORKSPACE}/.pkg-linux"

      - name: Resolve release notes
        run: |
          # Release-note body, in precedence order:
          #   1. Hand-authored docs/releases/RELEASE-<tag>.md, verbatim.
          #   2. The CHANGELOG section for this version, copied verbatim
          #      (docs/changelog.md, "## [VERSION] - date" sections). This
          #      is the usual path — the note IS the changelog entry.
          #   3. A minimal generic fallback if neither is present.
          # The body always ends with a Downloads pointer to the GitHub
          # release page. GitHub is the canonical download location, so
          # both the Gitea and GitHub release notes point to the files there.
          NOTES_FILE="${GITHUB_WORKSPACE}/.repo-clone/docs/releases/RELEASE-${TAG}.md"
          CHANGELOG_FILE="${GITHUB_WORKSPACE}/.repo-clone/docs/changelog.md"
          BODY_FILE="${GITHUB_WORKSPACE}/.release-body.md"
          GH_RELEASE_URL="https://github.com/jmagly/carbonyl/releases/tag/${TAG}"

          : > "${BODY_FILE}"

          if [ -f "${NOTES_FILE}" ]; then
            cp "${NOTES_FILE}" "${BODY_FILE}"
            echo "[release] body: hand-authored ${NOTES_FILE}"
          else
            # Extract the "## [VERSION]" section up to (not including) the
            # next "## " header. The trailing "]" in the match disambiguates
            # e.g. [0.2.0-alpha.1] from [0.2.0-alpha.11]; "### " subheaders
            # are preserved (the /^## / regex requires a space after exactly
            # two hashes).
            if [ -f "${CHANGELOG_FILE}" ]; then
              awk -v ver="[${VERSION}]" '
                /^## / { if (index($0, ver)) { grab=1; print; next } else if (grab) { exit } }
                grab { print }
              ' "${CHANGELOG_FILE}" > "${BODY_FILE}"
            fi
            if [ -s "${BODY_FILE}" ]; then
              echo "[release] body: changelog section for ${VERSION}"
            else
              {
                printf '# Carbonyl %s\n\n' "${VERSION}"
                printf 'Pre-built Chromium runtime for Carbonyl, ozone variants: %s.\n\n' "${OZONE_VARIANTS}"
                printf 'Runtime hash: `%s`\n' "${HASH}"
              } > "${BODY_FILE}"
              echo "[release] body: generic (no RELEASE note or changelog section for ${VERSION})"
            fi
          fi

          # Always point readers at the GitHub release assets.
          {
            printf '\n## Downloads\n\n'
            printf 'Pre-built binaries and installers are attached to the [GitHub release](%s).\n' "${GH_RELEASE_URL}"
          } >> "${BODY_FILE}"

          echo "BODY_FILE=${BODY_FILE}" >> "$GITHUB_ENV"

      - name: Create or reuse Gitea release
        env:
          GITEA_TOKEN: ${{ secrets.BUILD_REPO_TOKEN }}
        run: |
          API="https://git.integrolabs.net/api/v1/repos/${GITHUB_REPOSITORY}/releases"

          # Idempotent: if a release with this tag already exists,
          # reuse it (matches runtime-push.sh's pattern).
          existing="$(curl -sf -H "Authorization: token ${GITEA_TOKEN}" \
            "${API}/tags/${TAG}" 2>/dev/null || true)"
          if [ -n "$existing" ]; then
            RELEASE_ID="$(echo "$existing" | jq '.id')"
            echo "[release] Gitea release '${TAG}' already exists (id=${RELEASE_ID}); reusing"
          else
            BODY="$(jq -Rs '.' < "${BODY_FILE}")"
            resp="$(curl -s -w '\n__HTTP__%{http_code}' \
              -X POST "${API}" \
              -H "Authorization: token ${GITEA_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{
                \"tag_name\": \"${TAG}\",
                \"name\": \"Carbonyl ${VERSION}\",
                \"body\": ${BODY},
                \"draft\": false,
                \"prerelease\": $(echo "${TAG}" | grep -qE '\-(alpha|beta|rc)' && echo true || echo false)
              }")"
            code="${resp##*__HTTP__}"; body="${resp%__HTTP__*}"
            if [ "$code" != "201" ] && [ "$code" != "200" ]; then
              echo "ERROR: create-release HTTP ${code}: ${body}" >&2; exit 1
            fi
            RELEASE_ID="$(echo "$body" | jq '.id')"
            echo "[release] created Gitea release id=${RELEASE_ID}"
          fi
          echo "RELEASE_ID=${RELEASE_ID}" >> "$GITHUB_ENV"

      - name: Upload all staged assets to Gitea release
        env:
          GITEA_TOKEN: ${{ secrets.BUILD_REPO_TOKEN }}
        run: |
          API="https://git.integrolabs.net/api/v1/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets"
          for asset in "${STAGE}"/*; do
            name="$(basename "${asset}")"
            existing_id="$(curl -sf -H "Authorization: token ${GITEA_TOKEN}" "${API}" \
              | jq -r ".[] | select(.name == \"${name}\") | .id" 2>/dev/null || true)"
            if [ -n "${existing_id}" ]; then
              curl -sf -X DELETE -H "Authorization: token ${GITEA_TOKEN}" "${API}/${existing_id}"
              echo "[release] replaced existing asset ${name}"
            fi
            curl -sf -X POST "${API}" \
              -H "Authorization: token ${GITEA_TOKEN}" \
              -F "attachment=@${asset};filename=${name}" > /dev/null
            echo "[release] uploaded ${name}"
          done

      - name: Mirror release to GitHub (create or update + upload all assets)
        env:
          GH_TOKEN: ${{ secrets.GH_MIRROR_TOKEN }}
        run: |
          GH_API="https://api.github.com/repos/jmagly/carbonyl"

          PRERELEASE="$(echo "${TAG}" | grep -qE '\-(alpha|beta|rc)' && echo true || echo false)"
          BODY="$(jq -Rs '.' < "${BODY_FILE}")"

          # Mirror is idempotent. PATCH if release exists, POST if not.
          existing="$(curl -sf -H "Authorization: Bearer ${GH_TOKEN}" \
            "${GH_API}/releases/tags/${TAG}" 2>/dev/null || true)"
          if [ -n "${existing}" ]; then
            GH_RELEASE_ID="$(echo "${existing}" | jq '.id')"
            curl -sf -X PATCH "${GH_API}/releases/${GH_RELEASE_ID}" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -d "{\"name\": \"Carbonyl ${VERSION}\", \"body\": ${BODY}, \"prerelease\": ${PRERELEASE}}" \
              > /dev/null
            echo "[release] updated GitHub release id=${GH_RELEASE_ID}"
          else
            resp="$(curl -s -w '\n__HTTP__%{http_code}' \
              -X POST "${GH_API}/releases" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -d "{
                \"tag_name\": \"${TAG}\",
                \"name\": \"Carbonyl ${VERSION}\",
                \"body\": ${BODY},
                \"draft\": false,
                \"prerelease\": ${PRERELEASE}
              }")"
            code="${resp##*__HTTP__}"; body="${resp%__HTTP__*}"
            if [ "${code}" != "201" ]; then
              echo "ERROR: GitHub create-release HTTP ${code}: ${body}" >&2
              echo "       (mirror requires the v* tag to already exist on GitHub —" >&2
              echo "       confirm mirror.yml fired first.)" >&2
              exit 1
            fi
            GH_RELEASE_ID="$(echo "${body}" | jq '.id')"
            echo "[release] created GitHub release id=${GH_RELEASE_ID}"
          fi

          # Upload assets via the GitHub release upload URL.
          for asset in "${STAGE}"/*; do
            name="$(basename "${asset}")"
            mime="$(file -b --mime-type "${asset}")"
            # Delete existing same-name asset for idempotent re-runs.
            old_id="$(curl -sf -H "Authorization: Bearer ${GH_TOKEN}" \
              "${GH_API}/releases/${GH_RELEASE_ID}/assets" \
              | jq -r ".[] | select(.name == \"${name}\") | .id" 2>/dev/null || true)"
            if [ -n "${old_id}" ]; then
              curl -sf -X DELETE -H "Authorization: Bearer ${GH_TOKEN}" \
                "${GH_API}/releases/assets/${old_id}"
            fi
            curl -sf -X POST \
              "https://uploads.github.com/repos/jmagly/carbonyl/releases/${GH_RELEASE_ID}/assets?name=${name}" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Content-Type: ${mime}" \
              --data-binary "@${asset}" > /dev/null
            echo "[release] mirrored ${name} → GitHub"
          done

      - name: Cleanup
        if: always()
        run: |
          rm -rf "${GITHUB_WORKSPACE}/.repo-clone" \
                 "${GITHUB_WORKSPACE}/.release-stage" \
                 "${GITHUB_WORKSPACE}/.release-body.md" 2>/dev/null || true

      - name: Summary
        run: |
          echo ""
          echo "==> Release published"
          echo "    Gitea:  https://git.integrolabs.net/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
          echo "    GitHub: https://github.com/jmagly/carbonyl/releases/tag/${TAG}"
          echo "    Variants: ${OZONE_VARIANTS}"
          echo "    Linux triples: ${LINUX_TRIPLES}"
          echo "    macOS arm64: ${INCLUDE_MACOS}"
