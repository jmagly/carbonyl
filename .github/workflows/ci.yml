name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # Full `cargo build` requires the Chromium sysroot and built C++ objects.
      # Check and clippy type-check without linking.
      - name: cargo check
        run: cargo check --all-features

      - name: cargo clippy
        run: cargo clippy --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: cargo test
        run: cargo test --lib

  build-local:
    name: Build local binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libasound2 libexpat1 libfontconfig1 libnss3

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-build-

      - name: Cache pre-built runtime
        uses: actions/cache@v4
        with:
          path: build/pre-built
          key: runtime-${{ hashFiles('chromium/.gclient', 'chromium/patches/**', 'src/browser/*.cc', 'src/browser/*.h', 'src/browser/*.gn', 'src/browser/*.mojom') }}

      - name: Build (pull runtime + compile Rust lib)
        run: bash scripts/build-local.sh

      - name: Smoke test binary
        run: |
          triple=$(bash scripts/platform-triple.sh)
          dir="build/pre-built/$triple"
          LD_LIBRARY_PATH="$dir" "$dir/carbonyl" --version

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: carbonyl-linux-amd64
          path: build/pre-built/x86_64-unknown-linux-gnu/
          retention-days: 30
