<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <!-- Focus state is reflected into the document title; Carbonyl emits the
       title as an OSC control sequence (renderer.rs set_title:
       "\x1b]0;{title}\x07"), so this verification is independent of GPU/text
       rasterization — it works on a GL-less headless host. See README.md. -->
  <title>CFOCUS:none</title>
</head>
<body>
  <input id="f0" autofocus>
  <input id="f1">
  <input id="f2">
  <script>
    function reflect(id) { document.title = 'CFOCUS:' + id; }
    for (const el of document.querySelectorAll('input')) {
      el.addEventListener('focusin', () => reflect(el.id));
    }
    window.addEventListener('load', () => {
      const a = document.activeElement;
      reflect(a && a.id ? a.id : 'none');
    });
  </script>
</body>
</html>
